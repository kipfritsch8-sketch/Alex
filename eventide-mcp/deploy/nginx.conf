# 放到 /etc/nginx/sites-available/eventide-mcp
# ln -s /etc/nginx/sites-available/eventide-mcp /etc/nginx/sites-enabled/

server {
    listen 443 ssl;
    server_name eventide.alexmem.xyz;

    ssl_certificate     /etc/letsencrypt/live/eventide.alexmem.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventide.alexmem.xyz/privkey.pem;

    # SSE 需要关闭缓冲
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;

        # SSE 保持连接
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

server {
    listen 80;
    server_name eventide.alexmem.xyz;
    return 301 https://$host$request_uri;
}
